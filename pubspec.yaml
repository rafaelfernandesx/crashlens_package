name: crashlens_flutter
description: CrashLens SDK - Mini Sentry para Flutter. Captura erros, exceções, logs e informações do dispositivo.
version: 0.4.2
homepage: https://crashlens.laziv.com
repository: https://github.com/rafaelfernandesx/crashlens_package
issue_tracker: https://github.com/rafaelfernandesx/crashlens_package/issues
documentation: https://crashlens.laziv.com/docs
topics:
  - crashlens
  - crash-reporting
  - error-monitoring
  - flutter
  - sentry-alternative

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  package_info_plus: ^9.0.0
  device_info_plus: ^13.2.0
  connectivity_plus: ^7.3.0
  stack_trace: ^1.12.1
  uuid: ^4.6.0
  crypto: ^3.0.7
  dio: ^5.10.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter:
